name: Materialize interactive Astryx app

on:
  push:
    branches: [main]
    paths:
      - 'materialize/app-runtime.b64.part*'
      - '.github/workflows/materialize-interactions.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rebuild validated runtime
        run: |
          cat materialize/app-runtime.b64.part* > /tmp/app-runtime.b64
          echo '50b8389ad2993bcff41b2b4e9e5fce00878ba071e1600f83a90beccbd030147b  /tmp/app-runtime.b64' | sha256sum --check
          base64 --decode /tmp/app-runtime.b64 > src/AppRuntime.js
          echo 'c19470b794df83bbf0084c46909915744339bd87403163c50ee01d5cccedc055  src/AppRuntime.js' | sha256sum --check
          python - <<'PY'
          from pathlib import Path
          path = Path('src/main.tsx')
          text = path.read_text()
          old = "import App from './App';"
          new = "// @ts-expect-error Generated Astryx runtime is bundled by Vite.\nimport App from './AppRuntime.js';"
          if old in text:
              text = text.replace(old, new)
          path.write_text(text)
          PY

      - name: Validate application
        run: |
          npm install
          npm run lint
          npm run build

      - name: Commit interactive version
        run: |
          rm -rf materialize
          rm -f .github/workflows/materialize-interactions.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add interactive Astryx workflows"
          git push
