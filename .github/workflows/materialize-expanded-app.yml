name: Materialize expanded Astryx pages

on:
  push:
    branches: [main]
    paths:
      - patches/expanded-app.patch
      - .github/workflows/materialize-expanded-app.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply source patch
        run: |
          if git apply --check patches/expanded-app.patch; then
            git apply patches/expanded-app.patch
          else
            echo "Patch is already applied."
            exit 0
          fi

      - name: Commit expanded source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.tsx
          git commit -m "Materialize expanded Astryx pages"
          git push
